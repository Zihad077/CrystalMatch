<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Crystal Match - 🎯Best Puzzle game🎮</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        /* ========================
           PRO UI & COLOR PALETTE
           ======================== */
        :root { 
            --cell-size: 12.5%; 
            --board-bg: #1a1a2e; 
            --bg-grad-1: #0f2027; 
            --bg-grad-2: #203a43;
            --bg-grad-3: #2c5364;
            --primary: #00e5ff;
        }
        
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; touch-action: none; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom);
            background: linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2), var(--bg-grad-3));
            font-family: 'Nunito', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden; color: white;
        }

        .game-wrapper { width: 100%; max-width: 420px; padding: 10px; position: relative; display: flex; flex-direction: column; justify-content: center; height: 100%; }

        /* SVG ICONS */
        .icon { width: 20px; height: 20px; fill: currentColor; display: inline-block; vertical-align: middle; }

        /* TELEGRAM PROFILE & COINS BAR */
        .profile-bar { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.4); padding: 8px 12px; border-radius: 20px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .user-info { display: flex; align-items: center; gap: 10px; font-weight: 900; font-size: 1rem; color: #fff; }
        .avatar { width: 32px; height: 32px; background: #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 2px solid var(--primary); }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .coin-box { display: flex; align-items: center; gap: 5px; font-family: 'Fredoka One'; color: #ffca28; font-size: 1.1rem; background: rgba(0,0,0,0.5); padding: 4px 12px; border-radius: 15px; border: 1px solid #ffca28; }

        /* HEADER UI (Game Mode) */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .level-badge { background: linear-gradient(to right, #00c6ff, #0072ff); padding: 4px 20px; border-radius: 20px; font-family: 'Fredoka One'; font-size: 1.2rem; box-shadow: 0 4px 10px rgba(0,114,255,0.4); border: 2px solid rgba(255,255,255,0.2); }
        .btn-icon { background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2); color: white; border-radius: 12px; width: 42px; height: 42px; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); transition: 0.2s; }
        .btn-icon:active { transform: scale(0.9); background: rgba(255,255,255,0.3); }
        .btn-icon svg { width: 22px; height: 22px; fill: white; }

        /* PROGRESS & STATS */
        .progress-container { width: 100%; background: rgba(0,0,0,0.5); border-radius: 10px; height: 14px; position: relative; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.2); overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #00e5ff, #0072ff); width: 0%; transition: width 0.4s; }
        
        .stats-container { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .stat-box { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 12px; text-align: center; width: 48%; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5); }
        .stat-title { font-size: 0.7rem; font-weight: 900; text-transform: uppercase; color: #81d4fa; letter-spacing: 1px; }
        .stat-value { font-family: 'Fredoka One'; font-size: 1.5rem; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }

        /* GAME BOARD */
        .board-border { background: rgba(0,0,0,0.4); padding: 8px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); position: relative; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .grid-container { position: relative; width: 100%; aspect-ratio: 1; background-color: var(--board-bg); border-radius: 10px; overflow: hidden; box-shadow: inset 0 5px 15px rgba(0,0,0,0.8); }
        .grid-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: grid; grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(8, 1fr); }
        .grid-cell { background-color: rgba(255,255,255,0.03); border-radius: 6px; margin: 1px; }
        .grid-cell:nth-child(even) { background-color: rgba(0,0,0,0.2); }
        
        .grid-cell.ice::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(135, 206, 235, 0.3); border: 2px solid rgba(255,255,255,0.6); border-radius: 6px; box-shadow: inset 0 0 10px rgba(255,255,255,0.8); pointer-events: none; z-index: 1; }

        #particle-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .grid { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; }
        
        /* PREMIUM CRYSTAL CANDIES (CSS Geometric Art) */
        .sweet { position: absolute; width: var(--cell-size); height: var(--cell-size); padding: 4px; cursor: grab; display: flex; align-items: center; justify-content: center; will-change: transform; z-index: 3;}
        .sweet.animating { transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .sweet.hidden { transform: scale(0); opacity: 0; pointer-events: none; }
        .sweet-inner { width: 100%; height: 100%; position: relative; transition: transform 0.15s; display: flex; align-items: center; justify-content: center; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.5)); }

        /* Powerup Glows */
        .sweet.bomb .sweet-inner { animation: pulseBomb 0.8s infinite alternate; filter: drop-shadow(0 0 8px #fff); }
        @keyframes pulseBomb { 0% { transform: scale(0.95); } 100% { transform: scale(1.1); filter: drop-shadow(0 0 15px #ffeb3b); } }

        .sweet.color_bomb .sweet-inner { background: conic-gradient(red, yellow, lime, aqua, blue, magenta, red); border-radius: 50%; border: 3px solid white; animation: spinRainbow 2s linear infinite; box-shadow: 0 0 15px white, inset 0 0 10px rgba(0,0,0,0.5); }
        .sweet.color_bomb .sweet-inner::after { content: ''; position: absolute; top: 25%; left: 25%; width: 50%; height: 50%; background: #1a1a2e; border-radius: 50%; border: 2px solid white; }
        @keyframes spinRainbow { 100% { transform: rotate(360deg); } }

        /* Distinct Shapes & Colors for Clarity */
        .crystal-blue { background: linear-gradient(135deg, #00f2fe, #4facfe); clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); width: 90%; height: 90%; }
        .crystal-red { background: linear-gradient(135deg, #ff0844, #ffb199); clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); width: 95%; height: 95%; }
        .crystal-yellow { background: linear-gradient(135deg, #f6d365, #fda085); clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); width: 95%; height: 95%; }
        .crystal-green { background: linear-gradient(135deg, #43e97b, #38f9d7); border-radius: 50%; width: 85%; height: 85%; box-shadow: inset -3px -3px 6px rgba(0,0,0,0.2); }
        .crystal-purple { background: linear-gradient(135deg, #c471ed, #f64f59); border-radius: 8px; width: 85%; height: 85%; transform: rotate(15deg); }

        /* Add glossy reflection to all crystals */
        .crystal-blue::after, .crystal-red::after, .crystal-green::after, .crystal-purple::after {
            content: ''; position: absolute; top: 10%; left: 10%; width: 40%; height: 30%; background: rgba(255,255,255,0.6); border-radius: 50%; transform: rotate(-30deg);
        }

        /* SCREENS & MODALS */
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 32, 39, 0.95); display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 5vh; z-index: 100; transition: opacity 0.3s; backdrop-filter: blur(8px); overflow-y: auto; }
        .screen.hidden { opacity: 0; pointer-events: none; }
        .screen h1 { font-family: 'Fredoka One'; font-size: 2.5rem; color: #fff; margin: 0; text-shadow: 0 4px 10px rgba(0,0,0,0.5); text-align: center; }
        .screen p { font-size: 1rem; text-align: center; margin: 5px 0 15px; color: #aaa; }
        
        /* STORE / BOOSTERS (In Main Menu) */
        .store-container { width: 90%; background: rgba(0,0,0,0.3); border-radius: 15px; padding: 10px; margin: 15px 0; border: 1px solid rgba(255,255,255,0.1); }
        .store-title { font-weight: 900; font-size: 0.9rem; color: #ffca28; margin-bottom: 10px; text-align: center; text-transform: uppercase; }
        .booster-list { display: flex; justify-content: space-between; gap: 10px; }
        .booster-card { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 10px 5px; text-align: center; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; }
        .booster-card.active { background: rgba(0, 229, 255, 0.2); border-color: #00e5ff; box-shadow: 0 0 10px rgba(0,229,255,0.3); }
        .booster-icon { width: 30px; height: 30px; margin-bottom: 5px; }
        .booster-cost { display: flex; align-items: center; gap: 3px; font-size: 0.85rem; color: #ffca28; font-weight: bold; }
        
        /* AD CONTAINERS */
        .ad-banner-box { width: 300px; min-height: 250px; background: rgba(255,255,255,0.05); border-radius: 8px; display: flex; align-items: center; justify-content: center; margin: 10px 0; border: 1px dashed rgba(255,255,255,0.2); }
        
        /* BUTTONS */
        .btn-primary { background: linear-gradient(to right, #00c6ff, #0072ff); color: white; border: none; padding: 12px 30px; font-size: 1.2rem; font-family: 'Fredoka One'; border-radius: 30px; cursor: pointer; box-shadow: 0 6px 15px rgba(0, 114, 255, 0.4); text-transform: uppercase; transition: transform 0.1s; display: flex; align-items: center; gap: 8px; margin: 5px; width: 80%; max-width: 300px; justify-content: center; }
        .btn-primary:active { transform: scale(0.95); }
        .btn-reward { background: linear-gradient(to right, #f6d365, #fda085); color: #333; box-shadow: 0 6px 15px rgba(253, 160, 133, 0.4); }
        .btn-danger { background: linear-gradient(to right, #ff416c, #ff4b2b); box-shadow: 0 6px 15px rgba(255, 65, 108, 0.4); }

        /* Effects */
        .shake-board { animation: shakeBoard 0.4s both; }
        @keyframes shakeBoard { 0%, 100% {transform: translateX(0);} 20%, 60% {transform: translateX(-4px);} 40%, 80% {transform: translateX(4px);} }
        .floating-text { position: absolute; font-family: 'Fredoka One'; font-size: 2rem; color: #fff; text-shadow: 0 2px 5px #000; z-index: 50; animation: floatTxt 1s forwards; pointer-events: none;}
        @keyframes floatTxt { 0% { transform: translate(-50%, 0) scale(0.5); opacity: 0; } 20% { transform: translate(-50%, -20px) scale(1.1); opacity: 1; } 100% { transform: translate(-50%, -60px) scale(0.8); opacity: 0; } }

        /* Hide main game UI when in main menu */
        .hide-game .top-bar, .hide-game .progress-container, .hide-game .stats-container, .hide-game .board-border { display: none; }
    </style>
</head>

    <script>
        // Telegram Setup
        const tg = window.Telegram.WebApp;
        tg.expand(); tg.ready();

        let playerName = "Player";
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            playerName = tg.initDataUnsafe.user.first_name;
            if(tg.initDataUnsafe.user.photo_url) {
                document.getElementById('tg-avatar').innerHTML = `<img src="${tg.initDataUnsafe.user.photo_url}" alt="DP">`;
            } else {
                document.getElementById('tg-avatar').innerText = playerName.charAt(0).toUpperCase();
            }
        }
        document.getElementById('tg-name').innerText = playerName;

        // Smartlink Reward Logic
        const SMARTLINK_URL = "https://resignedincidentallysurprise.com/jd7whejrec?key=fa20dd17a9576d76815d4dacbdc71e1b";

        function watchAdForMoves() {
            window.open(SMARTLINK_URL, '_blank');
            moves += 5; updateUI();
            document.getElementById('game-over-screen').classList.add('hidden');
            if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            showFloatingScore(3, 3, "+5 MOVES!", 0); resetHintTimer();
        }

        function watchAdForCoins() {
            window.open(SMARTLINK_URL, '_blank');
            totalCoins += 500; updateCoinUI();
            if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            let btn = document.querySelector('#main-menu .btn-reward');
            btn.innerHTML = "Collected!"; btn.style.background = "#4CAF50"; btn.style.color="#fff"; btn.disabled = true;
        }

        // Booster Logic

        // Game Core

        let isAnimating = false, currentCombo = 0, hintTimer = null, isMuted = false, isPaused = false;

        // Audio & Haptics

        function playSound(type) {

        function toggleSound() {

        const sleep = ms => new Promise(r => setTimeout(r, ms));

        // Object Pooling

        function getPooledSweet() { return sweetPool.find(s => !s.active); }

        // Game Core

        function getLevelConfig(level) { const movesList =[0, 15, 20, 22, 25, 30]; return { moves: movesList[level] || 25, target: 1000 + (level * 600), iceCount: level === 1 ? 0 : Math.min(30, level * 5) }; }

        function pauseGame() { isPaused = true; clearHint(); document.getElementById('pause-screen').classList.remove('hidden'); }

        function quitToMenu() {

        function startNextLevel() { currentLevel++; document.getElementById('next-level-screen').classList.add('hidden'); loadLevel(false); }
        function retryLevel() { document.getElementById('game-over-screen').classList.add('hidden'); loadLevel(false); }

        function loadLevel(isNewStart) {
            const config = getLevelConfig(currentLevel);
            moves = config.moves; targetScore = config.target; score = 0;
            
            // Apply Boosters if coming from Main Menu
            if(isNewStart) {
                if(activeBoosters.moves) moves += 5;
            }

            document.getElementById('level-ui').innerText = `Level ${currentLevel}`;
            createGridUI();
            let icePlaced = 0; while(icePlaced < config.iceCount) { let rx = Math.floor(Math.random() * gridSize), ry = Math.floor(Math.random() * gridSize); if(!iceGrid[ry][rx]) { iceGrid[ry][rx] = true; document.getElementById(`cell-${rx}-${ry}`).classList.add('ice'); icePlaced++; } }

            // Apply Board Boosters

                if(activeBoosters.bomb) { let rx = Math.floor(Math.random()*gridSize), ry = Math.floor(Math.random()*gridSize); let tObj = sweetTypes[Math.floor(Math.random() * sweetTypes.length)]; destroySweet(board[ry][rx]); board[ry][rx] = assignSweet(rx, ry, tObj, 'bomb', false); }
                if(activeBoosters.colorBomb) { let rx = Math.floor(Math.random()*gridSize), ry = Math.floor(Math.random()*gridSize); destroySweet(board[ry][rx]); board[ry][rx] = assignSweet(rx, ry, null, 'color_bomb', false); }

        }

        function updateUI() {
            document.getElementById('score-ui').innerText = score; document.getElementById('moves-ui').innerText = moves;
            let progress = Math.min(100, (score / targetScore) * 100); document.getElementById('progress-bar').style.width = `${progress}%`;
        }

        let dragItem = null, targetItem = null, startX, startY, pxX, pxY, cellSize;
        gridEl.addEventListener('pointerdown', e => {
            if (isAnimating || moves <= 0 || isPaused) return; clearHint();
            const rect = gridEl.getBoundingClientRect(); cellSize = rect.width / gridSize;
            const x = Math.floor((e.clientX - rect.left) / cellSize), y = Math.floor((e.clientY - rect.top) / cellSize);
            if(x>=0 && x<gridSize && y>=0 && y<gridSize && board[y][x]) { dragItem = board[y][x]; startX = x; startY = y; pxX = e.clientX; pxY = e.clientY; dragItem.element.style.zIndex = "100"; dragItem.element.classList.remove('animating'); }
        });
        window.addEventListener('pointermove', e => {
            if (!dragItem || isAnimating || isPaused) return;
            let dx = e.clientX - pxX, dy = e.clientY - pxY;
            if (Math.abs(dx) > Math.abs(dy)) dy = 0; else dx = 0;
            dx = Math.max(-cellSize, Math.min(cellSize, dx)); dy = Math.max(-cellSize, Math.min(cellSize, dy));
            let tX = startX + (dx > cellSize*0.5 ? 1 : (dx < -cellSize*0.5 ? -1 : 0)), tY = startY + (dy > cellSize*0.5 ? 1 : (dy < -cellSize*0.5 ? -1 : 0));
            if(tX < 0 || tX >= gridSize || tY < 0 || tY >= gridSize) { tX = startX; tY = startY; }
            dragItem.element.style.transform = `translate3d(calc(${startX * 100}% + ${dx}px), calc(${startY * 100}% + ${dy}px), 0)`;
            if (targetItem && targetItem !== board[tY][tX]) { targetItem.element.classList.add('animating'); updatePositions(targetItem); }
            if (tX !== startX || tY !== startY) { targetItem = board[tY][tX]; if(targetItem) { targetItem.element.classList.remove('animating'); targetItem.element.style.transform = `translate3d(calc(${tX * 100}% - ${dx}px), calc(${tY * 100}% - ${dy}px), 0)`; } } else targetItem = null;
        });

        window.addEventListener('pointerup', async () => {
            if (!dragItem || isPaused) return;
            let item1 = dragItem, item2 = targetItem;
            item1.element.style.zIndex = "3"; item1.element.classList.add('animating'); if(item2) item2.element.classList.add('animating');
            dragItem = null; targetItem = null;

            if (item2 && item1 !== item2 && !isAnimating) {
                isAnimating = true; playSound('swap'); swapData(item1, item2); updatePositions(item1, item2); await sleep(250);
                if(item1.special === 'color_bomb' || item2.special === 'color_bomb') {
                    moves--; currentCombo = 0; updateUI(); let colorTarget = item1.special === 'color_bomb' ? item2.type : item1.type; let bombObj = item1.special === 'color_bomb' ? item1 : item2;
                    let matches =[]; if(item1.special === 'color_bomb' && item2.special === 'color_bomb') { colorTarget = 'ALL'; } matches.push({ type: 'color_bomb_trigger', color: colorTarget, source: bombObj }); await processMatches(matches); return;
                }
                let matchedGroups = findMatches();

                    moves--; currentCombo = 0; updateUI(); 
                    matchedGroups.forEach(g => { if(g.some(m => m.x === item1.x && m.y === item1.y)) g.intersection = {x: item1.x, y: item1.y}; else if(g.some(m => m.x === item2.x && m.y === item2.y)) g.intersection = {x: item2.x, y: item2.y}; });
                    await processMatches(matchedGroups);
                } else { playSound('swap'); swapData(item1, item2); updatePositions(item1, item2); await sleep(250); isAnimating = false; resetHintTimer(); }
            } else updatePositions(item1);
        });

        function swapData(i1, i2) { let tx = i1.x, ty = i1.y; i1.x = i2.x; i1.y = i2.y; i2.x = tx; i2.y = ty; board[i1.y][i1.x] = i1; board[i2.y][i2.x] = i2; }
        function updatePositions(...items) { items.forEach(i => { if(i) i.element.style.transform = `translate3d(${i.x * 100}%, ${i.y * 100}%, 0)`; }); }

        function findMatches() {
            let matches =[]; 
            for(let y=0; y<gridSize; y++) { for(let x=0; x<gridSize-2; x++) { let t = board[y][x]?.type; if(!t || board[y][x].special === 'color_bomb') continue; let mLen = 1; while(x+mLen<gridSize && board[y][x+mLen]?.type===t && board[y][x+mLen]?.special !== 'color_bomb') mLen++; if(mLen>=3) { let group =[]; for(let i=0; i<mLen; i++) group.push({x:x+i, y}); matches.push(group); x += mLen-1; } } }
            for(let x=0; x<gridSize; x++) { for(let y=0; y<gridSize-2; y++) { let t = board[y][x]?.type; if(!t || board[y][x].special === 'color_bomb') continue; let mLen = 1; while(y+mLen<gridSize && board[y+mLen][x]?.type===t && board[y+mLen][x]?.special !== 'color_bomb') mLen++; if(mLen>=3) { let group =[]; for(let i=0; i<mLen; i++) group.push({x, y:y+i}); matches.push(group); y += mLen-1; } } }
            return matches;
        }

        async function processMatches(matchGroups) {
            currentCombo++; let toDestroy = new Set(), spawnPowerups =[];
            matchGroups.forEach(g => {
                if(g.type === 'color_bomb_trigger') { toDestroy.add(`${g.source.x},${g.source.y}`); for(let y=0; y<gridSize; y++){ for(let x=0; x<gridSize; x++){ if(board[y][x] && (g.color === 'ALL' || board[y][x].type === g.color)) { toDestroy.add(`${x},${y}`); } } } return; }
                if(g.length >= 5) { let target = g.intersection || g[2]; spawnPowerups.push({x: target.x, y: target.y, type: 'color_bomb'}); } 
                else if(g.length === 4) { let target = g.intersection || g[1]; spawnPowerups.push({x: target.x, y: target.y, type: 'bomb'}); }
                g.forEach(m => toDestroy.add(`${m.x},${m.y}`));
            });
            if(matchGroups.length > 1 && matchGroups[0].type !== 'color_bomb_trigger') { let coords =[], counts = {}; matchGroups.forEach(g => g.forEach(m => coords.push(`${m.x},${m.y}`))); coords.forEach(c => { counts[c] = (counts[c] || 0) + 1; }); for(let c in counts) { if(counts[c] > 1) { const[x, y] = c.split(',').map(Number); if(!spawnPowerups.some(p => p.x === x && p.y === y)) spawnPowerups.push({x, y, type: 'bomb'}); } } }
            let destroyList = Array.from(toDestroy).map(str => { const [x, y] = str.split(',').map(Number); return {x, y}; }), bombTriggered = false, colorBombTriggered = false, tempDest = [...destroyList];
            for (let item of tempDest) { let sweet = board[item.y][item.x]; if(sweet && sweet.special === 'bomb') { bombTriggered = true; for(let dy=-1; dy<=1; dy++) { for(let dx=-1; dx<=1; dx++) { let nx = item.x+dx, ny = item.y+dy; if(nx>=0 && nx<gridSize && ny>=0 && ny<gridSize) toDestroy.add(`${nx},${ny}`); } } } if(sweet && sweet.special === 'color_bomb' && matchGroups[0]?.type !== 'color_bomb_trigger') { colorBombTriggered = true; let randType = sweetTypes[Math.floor(Math.random()*sweetTypes.length)].id; for(let y=0; y<gridSize; y++){ for(let x=0; x<gridSize; x++){ if(board[y][x] && board[y][x].type === randType) toDestroy.add(`${x},${y}`); } } } }
            destroyList = Array.from(toDestroy).map(str => { const[x, y] = str.split(',').map(Number); return {x, y}; });
            if(colorBombTriggered || matchGroups[0]?.type === 'color_bomb_trigger') { playSound('color_bomb'); boardBorder.classList.add('shake-board'); setTimeout(()=>boardBorder.classList.remove('shake-board'), 600); } else if(bombTriggered) { playSound('bomb'); boardBorder.classList.add('shake-board'); setTimeout(()=>boardBorder.classList.remove('shake-board'), 400); } else { playSound('pop'); }
            const points = destroyList.length * 10 * currentCombo; score += points; updateUI();
            destroyList.forEach(({x, y}) => { const s = board[y][x]; if(s) { spawnParticles(x, y, s.color, s.special !== 'none'); if(iceGrid[y][x]) { iceGrid[y][x] = false; document.getElementById(`cell-${x}-${y}`).classList.remove('ice'); } destroySweet(s); board[y][x] = null; } });
            if(destroyList.length > 0) showFloatingScore(destroyList[0].x, destroyList[0].y, points, currentCombo); await sleep(200);
            spawnPowerups.forEach(p => { if(board[p.y][p.x] === null) { if(p.type === 'color_bomb') { board[p.y][p.x] = assignSweet(p.x, p.y, null, 'color_bomb', false); } else { let tObj = sweetTypes[Math.floor(Math.random()*sweetTypes.length)]; board[p.y][p.x] = assignSweet(p.x, p.y, tObj, 'bomb', false); } } });
            await applyGravity(); const nextMatches = findMatches(); if(nextMatches.length > 0) { await sleep(50); await processMatches(nextMatches); } else checkGameState();
        }

        async function applyGravity() {
            let moved = false;
            for (let x = 0; x < gridSize; x++) { let emptyY = gridSize - 1; for (let y = gridSize - 1; y >= 0; y--) { if (board[y][x]) { if (emptyY !== y) { let s = board[y][x]; s.y = emptyY; board[emptyY][x] = s; board[y][x] = null; updatePositions(s); moved = true; } emptyY--; } } for (let y = emptyY; y >= 0; y--) { const tObj = sweetTypes[Math.floor(Math.random() * sweetTypes.length)]; board[y][x] = assignSweet(x, y, tObj, 'none', true); moved = true; } }
            if (moved) await sleep(300);
        }

        function checkGameState() {
            isAnimating = false; let totalIce = iceGrid.flat().filter(i => i).length;
            if(score >= targetScore && totalIce === 0) {
                playSound('win'); 
                let stars = score > targetScore * 1.5 ? 3 : (score > targetScore * 1.2 ? 2 : 1);
                let earnedCoins = stars * 100; totalCoins += earnedCoins; updateCoinUI(); document.getElementById('earned-coins').innerText = earnedCoins;
                document.getElementById('next-level-screen').classList.remove('hidden'); clearHint();
            } else if (moves <= 0) {
                playSound('lose'); document.getElementById('game-over-screen').classList.remove('hidden'); clearHint();
            } else { if(!hasPossibleMoves()) shuffleBoard(); resetHintTimer(); }
        }

        function resetHintTimer() { clearHint(); hintTimer = setTimeout(() => { let move = findOnePossibleMove(); if(move) board[move.y1][move.x1].element.classList.add('hint'); }, 4000); }
        function clearHint() { clearTimeout(hintTimer); sweetPool.forEach(s => s.element.classList.remove('hint')); }

        function hasPossibleMoves() { return findOnePossibleMove() !== null; }
        function findOnePossibleMove() {
            for(let y=0; y<gridSize; y++){ for(let x=0; x<gridSize; x++){ if(board[y][x] && board[y][x].special === 'color_bomb') return {x1:x, y1:y}; } }
            for(let y=0; y<gridSize; y++){ for(let x=0; x<gridSize-1; x++){ swapData(board[y][x], board[y][x+1]); let hasM = findMatches().length > 0; swapData(board[y][x], board[y][x+1]); if(hasM) return {x1:x, y1:y}; } }
            for(let x=0; x<gridSize; x++){ for(let y=0; y<gridSize-1; y++){ swapData(board[y][x], board[y+1][x]); let hasM = findMatches().length > 0; swapData(board[y][x], board[y+1][x]); if(hasM) return {x1:x, y1:y}; } }
            return null;
        }

        async function shuffleBoard() {
            isAnimating = true; showFloatingScore(3, 3, "SHUFFLING!", 0); await sleep(800);
            let allSweets =[]; for(let y=0; y<gridSize; y++) for(let x=0; x<gridSize; x++) allSweets.push(board[y][x]);
            for(let i=allSweets.length-1; i>0; i--) { let j = Math.floor(Math.random()*(i+1)); [allSweets[i], allSweets[j]] = [allSweets[j], allSweets[i]]; }
            let i=0; for(let y=0; y<gridSize; y++) { for(let x=0; x<gridSize; x++) { let s = allSweets[i++]; s.x = x; s.y = y; board[y][x] = s; updatePositions(s); } }
            await sleep(350); let checkM = findMatches(); if(checkM.length>0) processMatches(checkM); else { isAnimating=false; resetHintTimer(); if(!hasPossibleMoves()) shuffleBoard(); }
        }

        function showFloatingScore(x, y, pts, combo) {
            const el = document.createElement('div'); el.className = 'floating-text'; el.innerText = pts === "SHUFFLING!" ? pts : (combo > 1 ? `Combo x${combo}!` : `+${pts}`);
            if(combo>1) el.style.color = '#ffca28'; el.style.left = `${(x+0.5)*(100/gridSize)}%`; el.style.top = `${(y+0.5)*(100/gridSize)}%`;
            gridEl.appendChild(el); setTimeout(()=>el.remove(), 1000);
        }
    </script>
